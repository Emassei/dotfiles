# Prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# New window
unbind '"'
unbind %
bind '"' split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy Config Reloads
bind r source-file ~/.tmux.conf

# Previous window (default p is taken by paste); n/N like vim search
bind N previous-window

# Toggle: join next window as a right-hand pane / split it back out
bind J run-shell "~/dotfiles/utils/tmux-join-toggle '#{pane_id}'"

# Direction
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Bare C-h/j/k/l moves panes, but passes through to vim so its split
# navigation still works (pairs with vim-tmux-navigator in vimrc)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# C-l no longer clears the shell; prefix C-l does instead
bind C-l send-keys C-l

# Floating scratch terminal (was clock; clock lives at ` :clock-mode)
unbind t
bind t display-popup -E -d '#{pane_current_path}' -w 75% -h 70%

# Reorder windows left/right (repeatable)
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Bounce to last-used session
bind Tab switch-client -l

# Ctrl+Space enters copy mode (Alacritty sends this for Ctrl+Shift+Space)
bind -n C-Space copy-mode

# Vim selection:
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "~/dotfiles/utils/copy"
bind-key -Tcopy-mode-vi 'C-v' send -X rectangle-toggle
# Mouse selection lands in the system clipboard too
bind-key -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/dotfiles/utils/copy"

setw -g mode-keys vi
