set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
source-file ~/dotfiles/tmux/tmux-keybindings.conf
set -g focus-events on

# No delay after Esc (vim mode switching), snappier status refresh
set -sg escape-time 10
set -g status-interval 5

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Quiet
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Panes
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg='#a03a3f'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=#e07a7a],#[fg=#7a3b3f]} ⊙ #{window_name}#{?#{>:#{window_panes},1}, · #{pane_index},} · #{pane_current_command} · #{b:pane_current_path} '
set -g base-index 1

# Statusbar — oxblood
set -g status-style bg='#5c1a1e'
set -g status-left '#[fg=#e07a7a,bg=#3d1114,bold] ☧ #S #[default] '
set -g status-left-length 30
set -g status-right "#{?pane_in_mode,#[fg=#1a0a0b]#[bg=#c9a227]#[bold] Δ #[default] ,}#{?client_prefix,#[fg=#3d1114]#[bg=#e07a7a]#[bold] Ω #[default] ,}#[fg=#7a3b3f]∴ #[fg=#a06060]#(~/dotfiles/utils/tmux-quote '#{session_id}') #[fg=#7a3b3f]∴ #[fg=#e07a7a]ΙΧΘΥΣ "
set -g status-right-length 100
setw -g window-status-current-format '#[fg=#e07a7a,bg=black] #I #W#{?window_zoomed_flag, Φ,} '
setw -g window-status-format '#[fg=#e0c8c8,bg=#5c1a1e][#I #W#{?window_zoomed_flag, Φ,}]'
set -g window-status-separator ''
set-option -g history-limit 250000

set-option -g renumber-windows on
# }
# So I can have an AM PM Clock
set  -g clock-mode-style 12

# Oxblood everywhere else: copy-mode selection, messages, popups, clock
set -g mode-style 'bg=#5c1a1e,fg=#e0c8c8'
set -g message-style 'bg=#3d1114,fg=#e07a7a'
set -g message-command-style 'bg=#3d1114,fg=#e0c8c8'
set -g popup-border-style 'fg=#a03a3f'
set -g popup-border-lines rounded
set -g clock-mode-colour '#a03a3f'

